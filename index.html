// ═══════════════════════════════════════════════════════════
//  1. ENTITY SYSTEM — factory functions
// ═══════════════════════════════════════════════════════════

function createInvader(text, x, speed) {
  return {
    type: 'invader',
    text,
    x,
    y: -20,
    speed,
    matched: 0,
    alive: true,
    wobble: Math.random() * Math.PI * 2,
    update() {
      if (!this.alive) return;
      this.y += this.speed;
      this.wobble += 0.03;
    },
    render(ctx) {
      if (!this.alive) return;
      const fontSize = this.text.length === 1 ? 22 : 16;
      ctx.font = `${fontSize}px ${FONT}`;
      const charW = fontSize * CHAR_RATIO;
      for (let i = 0; i < this.text.length; i++) {
        const cx = this.x + i * charW;
        const cy = this.y + Math.sin(this.wobble + i * 0.3) * 2;
        if (i < this.matched) {
          ctx.fillStyle = PALETTE.yellow;
        } else {
          ctx.fillStyle = PALETTE.primary;
        }
        ctx.fillText(this.text[i], cx, cy);
      }
      // Brackets around text
      const totalW = this.text.length * charW;
      ctx.strokeStyle = this.matched > 0 ? 'rgba(255,221,87,0.5)' : 'rgba(242,193,78,0.3)';
      ctx.lineWidth = 1;
      const top = this.y - fontSize + 2;
      const bot = this.y + 4;
      // Left bracket
      ctx.beginPath();
      ctx.moveTo(this.x - 8, top);
      ctx.lineTo(this.x - 12, top);
      ctx.lineTo(this.x - 12, bot);
      ctx.lineTo(this.x - 8, bot);
      ctx.stroke();
      // Right bracket
      ctx.beginPath();
      ctx.moveTo(this.x + totalW + 2, top);
      ctx.lineTo(this.x + totalW + 6, top);
      ctx.lineTo(this.x + totalW + 6, bot);
      ctx.lineTo(this.x + totalW + 2, bot);
      ctx.stroke();
      ctx.shadowBlur = 0;
    },
    centerX() {
      const charW = (this.text.length === 1 ? 22 : 16) * CHAR_RATIO;
      return this.x + (this.text.length * charW) / 2;
    },
  };
}

function createLaser(x1, y1, x2, y2) {
  return {
    type: 'laser',
    x: x1, y: y1,
    x1, y1, x2, y2,
    alive: true,
    life: 1.0,
    update() {
      this.life -= 0.08;
      if (this.life <= 0) this.alive = false;
    },
    render(ctx) {
      // Core beam (warm white)
      ctx.strokeStyle = `rgba(255, 255, 240, ${this.life})`;
      ctx.shadowColor = PALETTE.primary;
      ctx.shadowBlur = 10 * this.life;
      ctx.lineWidth = 3 * this.life;
      ctx.beginPath();
      ctx.moveTo(this.x1, this.y1);
      ctx.lineTo(this.x2, this.y2);
      ctx.stroke();
      // Outer glow (amber-orange)
      ctx.strokeStyle = `rgba(244, 135, 75, ${this.life * 0.5})`;
      ctx.lineWidth = 6 * this.life;
      ctx.beginPath();
      ctx.moveTo(this.x1, this.y1);
      ctx.lineTo(this.x2, this.y2);
      ctx.stroke();
      ctx.shadowBlur = 0;
    },
  };
}

function createParticle(x, y, char) {
  const angle = Math.random() * Math.PI * 2;
  const speed = Math.random() * 3 + 1;
  const showChar = char && Math.random() > 0.5; // decide once at creation
  // Random particle color: 40% amber, 25% yellow, 20% orange, 10% coral, 5% white
  const r = Math.random();
  const pColor = r < 0.4 ? [242,193,78] : r < 0.65 ? [255,221,87] : r < 0.85 ? [244,135,75] : r < 0.95 ? [224,92,92] : [255,255,255];
  return {
    type: 'particle',
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - 1,
    alive: true,
    life: 1.0,
    char: showChar ? char : null,
    size: Math.random() * 4 + 2,
    decay: 0.015 + Math.random() * 0.005,
    color: pColor,
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.05;
      this.life -= this.decay;
      if (this.life <= 0) this.alive = false;
    },
    render(ctx) {
      const rgb = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.life})`;
      const solid = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
      if (this.char) {
        ctx.font = `${this.size + 8}px ${FONT}`;
        ctx.fillStyle = rgb;
        ctx.shadowColor = solid;
        ctx.shadowBlur = 6;
        ctx.fillText(this.char, this.x, this.y);
      } else {
        ctx.fillStyle = rgb;
        ctx.shadowColor = solid;
        ctx.shadowBlur = 4;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
      ctx.shadowBlur = 0;
    },
  };
}

function createTurret() {
  return {
    x: W / 2,
    targetX: W / 2,
    targetY: 0,
    update() {
      this.x += (this.targetX - this.x) * 0.15;
    },
    render(ctx) {
      // Calculate barrel angle toward target
      const dx = this.targetX - this.x;
      const dy = this.targetY - (GROUND_Y - 20);
      const angle = Math.atan2(dy, dx);

      ctx.save();

      // Barrel (rotated toward target) — amber
      ctx.fillStyle = PALETTE.primary;
      ctx.save();
      ctx.translate(this.x, GROUND_Y - 10);
      ctx.rotate(angle);
      ctx.fillRect(0, -2, 20, 4);
      ctx.fillRect(18, -3, 4, 6); // tip
      ctx.restore();

      // Base (stays fixed) — orange
      ctx.fillStyle = PALETTE.orange;
      ctx.fillRect(this.x - 15, GROUND_Y - 8, 30, 8);

      ctx.restore();
    },
  };
}

function createLevelManager() {
  // Speed calibration: fall distance = 555px at 60fps
  // speed 1.0 ≈ 9.3s fall, 1.5 ≈ 6.2s, 2.0 ≈ 4.6s, 2.5 ≈ 3.7s
  // Beginner single-key: ~8s. Touch-typist words: ~6s. Master: ~4s.
  // spawnRate in ms. Lower = more frequent = harder.
  const levels = [
    // Home row (no semicolon — that comes later with punctuation)
    { name: "HOME ROW",         keys: "asdf jkl",       words: false, wordLen: null, minLen: 1, maxLen: 1, speed: 1.0,  spawnRate: 2200 },
    { name: "HOME ROW COMBOS",  keys: "asdf jkl",       words: false, wordLen: null, minLen: 2, maxLen: 2, speed: 1.0,  spawnRate: 2400 },
    // Expand outward from home row
    { name: "ADD G H",          keys: "asdfg hjkl",     words: false, wordLen: null, minLen: 1, maxLen: 2, speed: 1.05, spawnRate: 2000 },
    { name: "ADD T Y",          keys: "asdfg hjklty",   words: false, wordLen: null, minLen: 1, maxLen: 2, speed: 1.1,  spawnRate: 1900 },
    { name: "ADD R U",          keys: "asdfghjkltyru",  words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.15, spawnRate: 1800 },
    { name: "ADD E I",          keys: "asdfghjkltyruei", words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.2,  spawnRate: 1700 },
    { name: "ADD W O",          keys: "asdfghjkltyruewo", words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.25, spawnRate: 1600 },
    { name: "ADD Q P",          keys: "asdfghjkltyrueiwoqp", words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.3,  spawnRate: 1500 },
    { name: "ADD Z X C V",      keys: "asdfghjkltyrueiwoqpzxcv", words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.35, spawnRate: 1400 },
    { name: "ADD B N M",        keys: "asdfghjkltyrueiwoqpzxcvbnm", words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.4,  spawnRate: 1300 },
    // Words — slower spawn (longer to type) but steady speed increase
    { name: "SHORT WORDS",      keys: null, words: true, wordLen: [3, 4],  minLen: 3, maxLen: 4, speed: 1.2,  spawnRate: 2200 },
    { name: "MEDIUM WORDS",     keys: null, words: true, wordLen: [4, 6],  minLen: 4, maxLen: 6, speed: 1.3,  spawnRate: 2400 },
    { name: "LONG WORDS",       keys: null, words: true, wordLen: [5, 8],  minLen: 5, maxLen: 8, speed: 1.3,  spawnRate: 2800 },
    // Numbers — unfamiliar territory, slightly easier
    { name: "NUMBERS",          keys: "1234567890",     words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.15, spawnRate: 2000 },
    { name: "NUMBERS + LETTERS", keys: "abcdefghijklmnopqrstuvwxyz1234567890", words: false, wordLen: null, minLen: 2, maxLen: 4, speed: 1.4, spawnRate: 1600 },
    // Punctuation & symbols — slow down for new muscle memory
    { name: "PUNCTUATION",      keys: ".,;:!?'-",       words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.1,  spawnRate: 2000 },
    { name: "BRACKETS",         keys: "()[]{}<>",       words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.15, spawnRate: 1800 },
    { name: "SYMBOLS",          keys: "@#$%^&*~`/\\|\"+=_", words: false, wordLen: null, minLen: 1, maxLen: 3, speed: 1.2, spawnRate: 1800 },
    { name: "ALL SYMBOLS",      keys: ".,;:!?'-()[]{}<>@#$%^&*~`/\\|\"+=_", words: false, wordLen: null, minLen: 2, maxLen: 4, speed: 1.4, spawnRate: 1600 },
    // Expert — fast words, tight spawns
    { name: "EXPERT MODE",      keys: null, words: true, wordLen: [4, 8],  minLen: 4, maxLen: 8, speed: 1.7,  spawnRate: 1800 },
    { name: "MASTER MODE",      keys: null, words: true, wordLen: [5, 10], minLen: 5, maxLen: 10, speed: 2.1, spawnRate: 1500 },
  ];

  const killsToAdvance = 12;

  return {
    levels,
    current: 0,
    kills: 0,
    killsToAdvance,

    getConfig() {
      return this.levels[this.current];
    },

    generateText() {
      const def = this.levels[this.current];
      if (def.words) {
        const [minL, maxL] = def.wordLen;
        const candidates = WORDS.filter(w => w.length >= minL && w.length <= maxL);
        return candidates[Math.floor(Math.random() * candidates.length)];
      }
      const chars = def.keys.replace(/\s/g, '');
      const len = def.minLen + Math.floor(Math.random() * (def.maxLen - def.minLen + 1));
      let text = '';
      for (let i = 0; i < len; i++) {
        text += chars[Math.floor(Math.random() * chars.length)];
      }
      return text;
    },

    recordKill() {
      this.kills++;
      if (this.kills >= this.killsToAdvance && this.current < this.levels.length - 1) {
        this.current++;
        this.kills = 0;
        return true; // level advanced
      }
      return false;
    },

    reset() {
      this.current = 0;
      this.kills = 0;
    },
  };
}


// ═══════════════════════════════════════════════════════════
//  3. INPUT MANAGER
// ═══════════════════════════════════════════════════════════

function createInputManager() {
  return {
    buffer: '',

    handleKey(key, invaders) {
      // Escape — clear buffer
      if (key === 'Escape') {
        this.buffer = '';
        invaders.forEach(inv => { inv.matched = 0; });
        return { type: 'clear' };
      }

      // Backspace
      if (key === 'Backspace') {
        if (this.buffer.length > 0) {
          this.buffer = this.buffer.slice(0, -1);
          invaders.forEach(inv => {
            inv.matched = inv.alive && inv.text.startsWith(this.buffer) ? this.buffer.length : 0;
          });
          return { type: 'backspace' };
        }
        return { type: 'ignore' };
      }

      // Non-printable
      if (key.length !== 1) return { type: 'ignore' };

      const typed = key.toLowerCase();
      this.buffer += typed;

      // Check matches
      let bestMatch = null;
      let bestY = -Infinity;

      for (const inv of invaders) {
        if (!inv.alive) continue;
        if (inv.text.startsWith(this.buffer)) {
          inv.matched = this.buffer.length;
          if (inv.matched === inv.text.length && inv.y > bestY) {
            bestMatch = inv;
            bestY = inv.y;
          }
        } else {
          inv.matched = 0;
        }
      }

      // Full match — kill the lowest one
      if (bestMatch) {
        this.buffer = '';
        invaders.forEach(inv => { inv.matched = 0; });
        return { type: 'kill', target: bestMatch };
      }

      // Partial match?
      const anyMatch = invaders.some(inv => inv.alive && inv.text.startsWith(this.buffer));
      if (anyMatch) {
        return { type: 'partial' };
      }

      // Nothing matches — miss
      this.buffer = '';
      invaders.forEach(inv => { inv.matched = 0; });
      return { type: 'miss' };
    },

    clear() {
      this.buffer = '';
    },

    getDisplay() {
      return this.buffer.length > 0 ? '\u00bb ' + this.buffer + '_' : '';
    },
  };
}

function createRenderer(ctx) {
  // Star field (generated once) — 50% white, 20% amber, 20% teal, 10% lavender
  const starColors = [[255,255,255],[242,193,78],[91,200,175],[167,139,222]];
  const starWeights = [0.5, 0.7, 0.9, 1.0];
  const stars = [];
  for (let i = 0; i < 70; i++) {
    const r = Math.random();
    const ci = starWeights.findIndex(w => r < w);
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (GROUND_Y - 40),
      brightness: Math.random() * 0.3 + 0.1,
      phase: Math.random() * Math.PI * 2,
      color: starColors[ci],
    });
  }

  return {
    ctx,

    clear() {
      this.ctx.clearRect(0, 0, W, H);
    },

    drawStars() {
      const t = performance.now() / 1000;
      for (const s of stars) {
        const alpha = s.brightness * (0.5 + 0.5 * Math.sin(s.phase + t * 2));
        this.ctx.fillStyle = `rgba(${s.color[0]}, ${s.color[1]}, ${s.color[2]}, ${alpha})`;
        this.ctx.fillRect(s.x, s.y, 1, 1);
      }
    },

    drawGround() {
      this.ctx.strokeStyle = 'rgba(74, 63, 92, 0.6)';
      this.ctx.lineWidth = 1;
      this.ctx.beginPath();
      this.ctx.moveTo(0, GROUND_Y);
      this.ctx.lineTo(W, GROUND_Y);
      this.ctx.stroke();
    },

    drawFlash(intensity) {
      if (intensity > 0) {
        this.ctx.fillStyle = `rgba(255, 0, 0, ${intensity / 30})`;
        this.ctx.fillRect(0, 0, W, H);
      }
    },

    drawEntity(entity) {
      entity.render(this.ctx);
    },

    drawTurret(turret) {
      turret.render(this.ctx);
    },

    drawHUD(state) {
      const { score, lives, levelManager, inputManager, flashTimer } = state;
      const def = levelManager.getConfig();

      this.ctx.save();

      // Top bar: score, level, lives
      this.ctx.font = `10px ${FONT}`;
      this.ctx.textAlign = 'left';
      this.ctx.fillStyle = PALETTE.primary;
      this.ctx.fillText('SCORE: ' + score, 16, 22);

      this.ctx.textAlign = 'center';
      this.ctx.fillStyle = PALETTE.lavender;
      this.ctx.fillText('LEVEL ' + (levelManager.current + 1), W / 2, 22);

      this.ctx.textAlign = 'right';
      this.ctx.fillStyle = PALETTE.danger;
      const hearts = '\u2665'.repeat(Math.max(0, lives));
      this.ctx.fillText(hearts, W - 16, 22);

      // Bottom: level name + progress
      this.ctx.textAlign = 'center';
      this.ctx.fillStyle = PALETTE.dim;
      this.ctx.font = `8px ${FONT}`;
      this.ctx.fillText(
        def.name + '  [' + levelManager.kills + '/' + levelManager.killsToAdvance + ']',
        W / 2, H - 8
      );

      // Input buffer
      const display = inputManager.getDisplay();
      if (display) {
        this.ctx.font = `16px ${FONT}`;
        this.ctx.fillStyle = flashTimer > 0 ? PALETTE.danger : PALETTE.primary;
        this.ctx.fillText(display, W / 2, GROUND_Y + 30);
      }

      this.ctx.restore();
    },

    drawPause() {
      // Dim overlay
      this.ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      this.ctx.fillRect(0, 0, W, H);

      this.ctx.save();
      this.ctx.textAlign = 'center';

      const pulse = Math.sin(Date.now() / 200) * 0.2 + 0.8;
      this.ctx.font = `20px ${FONT}`;
      this.ctx.fillStyle = `rgba(167, 139, 222, ${pulse})`;
      this.ctx.fillText('PAUSED', W / 2, 270);

      this.ctx.font = `9px ${FONT}`;
      this.ctx.fillStyle = PALETTE.dim;
      this.ctx.fillText('SPACE: RESUME    N: SKIP LEVEL', W / 2, 310);

      this.ctx.restore();
    },

    // Full-screen keyboard hand placement diagram
    // Reusable keyboard diagram. activeKeys = null means all lit, otherwise
    // a Set of lowercase chars — active keys are bright, others dimmed.
    // newKeys = optional Set of chars to pulse-highlight as newly introduced.
    _drawKeyboard(topY, activeKeys, scale, newKeys) {
      const c = this.ctx;
      const s = scale || 1;

      const FINGER = {
        lp: [255, 140, 30],   // left pinky — orange
        lr: [220, 40, 40],    // left ring — red
        lm: [40, 200, 60],    // left middle — green
        li: [50, 100, 255],   // left index — blue
        ri: [50, 100, 255],   // right index — blue
        rm: [40, 200, 60],    // right middle — green
        rr: [220, 40, 40],    // right ring — red
        rp: [255, 220, 30],   // right pinky — yellow
        th: [160, 50, 220],   // thumbs — purple
      };

      const rows = [
        {
          chars: ['`','1','2','3','4','5','6','7','8','9','0','-','='],
          offset: 0,
          fingers: [FINGER.lp,FINGER.lp,FINGER.lr,FINGER.lm,FINGER.li,FINGER.li,FINGER.ri,FINGER.ri,FINGER.rm,FINGER.rr,FINGER.rp,FINGER.rp,FINGER.rp],
        },
        {
          chars: ['Q','W','E','R','T','Y','U','I','O','P','[',']','\\'],
          offset: 0.5,
          fingers: [FINGER.lp,FINGER.lr,FINGER.lm,FINGER.li,FINGER.li,FINGER.ri,FINGER.ri,FINGER.rm,FINGER.rr,FINGER.rp,FINGER.rp,FINGER.rp,FINGER.rp],
        },
        {
          chars: ['A','S','D','F','G','H','J','K','L',';','\''],
          offset: 0.8,
          fingers: [FINGER.lp,FINGER.lr,FINGER.lm,FINGER.li,FINGER.li,FINGER.ri,FINGER.ri,FINGER.rm,FINGER.rr,FINGER.rp,FINGER.rp],
          home: true,
        },
        {
          chars: ['Z','X','C','V','B','N','M',',','.','/'],
          offset: 1.3,
          fingers: [FINGER.lp,FINGER.lr,FINGER.lm,FINGER.li,FINGER.li,FINGER.ri,FINGER.ri,FINGER.rm,FINGER.rr,FINGER.rp],
        },
      ];

      const keyS = Math.round(38 * s);
      const gap = Math.round(3 * s);
      const step = keyS + gap;
      const boardW = 13 * step;
      const baseX = (W - boardW) / 2;

      const _rgba = (rgb, a) => `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`;
      const _isActive = (ch) => !activeKeys || activeKeys.has(ch.toLowerCase());

      for (const row of rows) {
        const ry = topY + rows.indexOf(row) * step;
        const rx = baseX + row.offset * step;
        for (let k = 0; k < row.chars.length; k++) {
          const kx = rx + k * step;
          const isHome = row.home && [0,1,2,3,6,7,8,9].includes(k);
          const isBump = row.home && (k === 3 || k === 6);
          const active = _isActive(row.chars[k]);
          const isNew = newKeys && newKeys.has(row.chars[k].toLowerCase());
          const pulse = isNew ? (Math.sin(Date.now() / 200) * 0.3 + 0.7) : 1;

          // Key background
          c.fillStyle = active ? _rgba(row.fingers[k], 0.85) : _rgba(row.fingers[k], 0.12);
          c.fillRect(kx, ry, keyS, keyS);

          // New key glow overlay
          if (isNew) {
            c.fillStyle = `rgba(255, 255, 255, ${0.3 * pulse})`;
            c.fillRect(kx, ry, keyS, keyS);
          }

          // Key border
          if (isNew) {
            c.strokeStyle = `rgba(255, 255, 255, ${0.9 * pulse})`;
            c.lineWidth = 3;
          } else if (active && isHome) {
            c.strokeStyle = 'rgba(255,255,255,0.6)';
            c.lineWidth = 2.5;
          } else if (active) {
            c.strokeStyle = 'rgba(0,0,0,0.3)';
            c.lineWidth = 1;
          } else {
            c.strokeStyle = 'rgba(51,85,119,0.2)';
            c.lineWidth = 1;
          }
          c.strokeRect(kx, ry, keyS, keyS);

          // Letter
          c.font = `${Math.round(10 * s)}px ${FONT}`;
          c.fillStyle = isNew ? '#fff' : (active ? (isHome ? '#fff' : 'rgba(0,0,0,0.7)') : 'rgba(51,85,119,0.3)');
          c.textAlign = 'center';
          c.fillText(row.chars[k], kx + keyS / 2, ry + keyS / 2 + Math.round(4 * s));

          // Bump indicator on F and J
          if (isBump && active) {
            c.fillStyle = '#fff';
            c.fillRect(kx + keyS/2 - Math.round(6*s), ry + keyS - Math.round(5*s), Math.round(12*s), Math.round(2*s));
          }
        }
      }

      // Space bar
      const spaceY = topY + 4 * step;
      const spaceX = baseX + 3.5 * step;
      const spaceW = 6 * step - gap;
      const spaceActive = !activeKeys || activeKeys.has(' ');
      c.fillStyle = spaceActive ? _rgba(FINGER.th, 0.85) : _rgba(FINGER.th, 0.12);
      c.fillRect(spaceX, spaceY, spaceW, keyS);
      c.strokeStyle = spaceActive ? 'rgba(0,0,0,0.3)' : 'rgba(51,85,119,0.2)';
      c.lineWidth = 1;
      c.strokeRect(spaceX, spaceY, spaceW, keyS);
      if (spaceActive) {
        c.font = `${Math.round(8 * s)}px ${FONT}`;
        c.fillStyle = 'rgba(255,255,255,0.5)';
        c.fillText('THUMB', spaceX + spaceW / 2, spaceY + keyS / 2 + Math.round(3 * s));
      }

      return { step, keyS, baseX, topY }; // for callers that need layout info
    },

    _drawHands() {
      const c = this.ctx;
      c.save();

      // Title
      c.font = `16px ${FONT}`;
      c.fillStyle = PALETTE.primary;
      c.textAlign = 'center';
      c.fillText('HAND PLACEMENT', W / 2, 55);

      // ── Hand placement image — large and centered ──
      if (HANDS_IMG.complete && HANDS_IMG.naturalWidth > 0) {
        const imgAspect = HANDS_IMG.naturalWidth / HANDS_IMG.naturalHeight;
        const maxW = 460;    // cap width
        const maxH = 370;    // cap height
        let imgW, imgH;
        if (maxW / maxH > imgAspect) {
          imgH = maxH;
          imgW = imgH * imgAspect;
        } else {
          imgW = maxW;
          imgH = imgW / imgAspect;
        }
        const imgX = (W - imgW) / 2;
        const imgY = (H - imgH) / 2 + 10; // vertically centered, nudged down for title

        // Warm amber frame
        const frameP = 6;
        c.strokeStyle = 'rgba(242, 193, 78, 0.3)';
        c.lineWidth = 2;
        c.strokeRect(imgX - frameP, imgY - frameP, imgW + frameP * 2, imgH + frameP * 2);

        // Dark backing to blend image edges
        c.fillStyle = 'rgba(0, 0, 0, 0.3)';
        c.fillRect(imgX - frameP, imgY - frameP, imgW + frameP * 2, imgH + frameP * 2);

        // Draw the image
        c.drawImage(HANDS_IMG, imgX, imgY, imgW, imgH);

        // Slight vignette overlay on image edges to blend with dark bg
        const grad = c.createRadialGradient(W/2, imgY + imgH/2, imgW * 0.35, W/2, imgY + imgH/2, imgW * 0.6);
        grad.addColorStop(0, 'rgba(0,0,0,0)');
        grad.addColorStop(1, 'rgba(0,0,0,0.5)');
        c.fillStyle = grad;
        c.fillRect(imgX, imgY, imgW, imgH);
      }

      // Subtitle
      c.font = `8px ${FONT}`;
      c.fillStyle = PALETTE.dim;
      c.textAlign = 'center';
      c.fillText('EACH COLOR = ONE FINGER', W / 2, H - 40);

      // Blink prompt
      if (Math.sin(Date.now() / 300) > 0) {
        c.font = `10px ${FONT}`;
        c.fillStyle = PALETTE.primary;
        c.fillText('PRESS SPACE TO PLAY', W / 2, H - 18);
      }

      c.restore();
    },

    drawScreen(name, state) {
      this.clear();
      this.drawStars();

      this.ctx.save();
      this.ctx.textAlign = 'center';

      if (name === 'title') {
        this._drawTitle(state);
      } else if (name === 'hands') {
        this._drawHands();
      } else if (name === 'levelUp') {
        this._drawLevelUp(state);
      } else if (name === 'gameOver') {
        this._drawGameOver(state);
      }

      this.ctx.restore();
    },

    _drawTitle(state) {
      const c = this.ctx;

      // Decorative falling letters (behind everything) — amber tint
      const t = Date.now() / 1000;
      c.save();
      c.textAlign = 'center';
      c.font = `14px ${FONT}`;
      c.fillStyle = 'rgba(242, 193, 78, 0.05)';
      for (let i = 0; i < 10; i++) {
        const x = ((i * 97 + t * 30) % 820) - 10;
        const y = ((i * 137 + t * (20 + i * 5)) % 640) - 20;
        c.fillText('ASDFGHJKL'[i % 9], x, y);
      }
      c.restore();

      c.font = `24px ${FONT}`;
      c.fillStyle = PALETTE.primary;
      c.fillText('TYPE INVADERS', W / 2, 70);

      c.font = `8px ${FONT}`;
      c.fillStyle = PALETTE.cyan;
      c.fillText('LEARN TO TYPE OR DIE TRYING', W / 2, 100);

      // ── Level select grid ──
      const levels = state.levelManager.levels;
      const sel = state.startLevel;
      const cols = 2;
      const rowH = 22;
      const colW = 360;
      const gridX = W / 2 - (cols * colW) / 2;
      const gridY = 125;

      c.textAlign = 'left';
      for (let i = 0; i < levels.length; i++) {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = gridX + col * colW + 10;
        const y = gridY + row * rowH;
        const selected = i === sel;

        if (selected) {
          // Amber highlight bar (filled, no stroke)
          c.fillStyle = 'rgba(242, 193, 78, 0.15)';
          c.fillRect(x - 6, y - 14, colW - 10, rowH - 2);
        }

        c.font = `9px ${FONT}`;
        c.fillStyle = selected ? PALETTE.primary : PALETTE.dim;
        const num = String(i + 1).padStart(2, ' ');
        c.fillText(num + '. ' + levels[i].name, x, y);
      }

      // Position bottom elements relative to grid
      const gridBottom = gridY + Math.ceil(levels.length / cols) * rowH;

      // Controls
      c.textAlign = 'center';
      c.font = `8px ${FONT}`;
      c.fillStyle = PALETTE.dim;
      c.fillText('ARROW KEYS TO SELECT LEVEL', W / 2, gridBottom + 18);

      // Instructions
      c.font = `8px ${FONT}`;
      c.fillStyle = PALETTE.dim;
      c.fillText('ESC: QUIT   BKSP: CORRECT   SPACE: PAUSE   N: SKIP', W / 2, gridBottom + 55);

      // Blink prompt
      if (Math.sin(Date.now() / 300) > 0) {
        c.font = `12px ${FONT}`;
        c.fillStyle = PALETTE.primary;
        c.fillText('PRESS SPACE TO START', W / 2, gridBottom + 90);
      }
    },

    _drawLevelUp(state) {
      const c = this.ctx;
      const def = state.levelManager.getConfig();

      const pulse = Math.sin(Date.now() / 200) * 0.15 + 0.85;
      c.font = `20px ${FONT}`;
      c.fillStyle = `rgba(242, 193, 78, ${pulse})`;
      c.fillText('LEVEL ' + (state.levelManager.current + 1), W / 2, 60);

      c.font = `12px ${FONT}`;
      c.fillStyle = PALETTE.cyan;
      c.fillText(def.name, W / 2, 95);

      // Build active key set from level definition
      let activeKeys = null;
      if (def.keys) {
        activeKeys = new Set();
        for (const ch of def.keys) {
          if (ch !== ' ') activeKeys.add(ch.toLowerCase());
        }
      }
      if (def.words) {
        activeKeys = new Set('abcdefghijklmnopqrstuvwxyz');
      }

      // Compute NEW keys = current level keys minus previous level keys
      let newKeys = null;
      const lvl = state.levelManager.current;
      if (lvl > 0 && activeKeys) {
        const prevDef = state.levelManager.levels[lvl - 1];
        const prevKeys = new Set();
        if (prevDef.keys) {
          for (const ch of prevDef.keys) if (ch !== ' ') prevKeys.add(ch.toLowerCase());
        } else if (prevDef.words) {
          for (const ch of 'abcdefghijklmnopqrstuvwxyz') prevKeys.add(ch);
        }
        newKeys = new Set([...activeKeys].filter(k => !prevKeys.has(k)));
        if (newKeys.size === 0) newKeys = null; // no diff (e.g. same keys, different combos)
      } else if (lvl === 0 && activeKeys) {
        newKeys = activeKeys; // first level — all keys are new
      }

      // Draw keyboard with active keys highlighted, new keys pulsing
      this._drawKeyboard(120, activeKeys, 0.85, newKeys);

      c.font = `9px ${FONT}`;
      c.fillStyle = PALETTE.orange;
      c.textAlign = 'center';
      const bars = Math.round(def.speed / 0.1);
      c.fillText('SPEED: ' + '\u2588'.repeat(Math.min(bars, 15)), W / 2, 440);

      if (Math.sin(Date.now() / 300) > 0) {
        c.font = `9px ${FONT}`;
        c.fillStyle = PALETTE.primary;
        c.fillText('PRESS SPACE TO CONTINUE', W / 2, 470);
      }
    },

    _drawGameOver(state) {
      const c = this.ctx;
      const def = state.levelManager.getConfig();

      c.font = `24px ${FONT}`;
      c.fillStyle = PALETTE.danger;
      c.fillText('GAME OVER', W / 2, 220);

      c.font = `14px ${FONT}`;
      c.fillStyle = PALETTE.primary;
      c.fillText('SCORE: ' + state.score, W / 2, 280);

      c.font = `10px ${FONT}`;
      c.fillStyle = PALETTE.lavender;
      c.fillText('REACHED LEVEL ' + (state.levelManager.current + 1) + ': ' + def.name, W / 2, 320);

      if (Math.sin(Date.now() / 300) > 0) {
        c.font = `10px ${FONT}`;
        c.fillStyle = PALETTE.primary;
        c.fillText('PRESS SPACE TO CONTINUE', W / 2, 420);
      }
    },
  };
}


// ═══════════════════════════════════════════════════════════
//  5. GAME ENGINE
// ═══════════════════════════════════════════════════════════

function createEngine(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.font = `16px ${FONT}`;

  const renderer = createRenderer(ctx);
  const levelManager = createLevelManager();
  const inputManager = createInputManager();
  const turret = createTurret();

  const engine = {
    state: 'title',   // 'title' | 'playing' | 'levelUp' | 'gameOver'
    score: 0,
    lives: 3,
    entities: { invaders: [], lasers: [], particles: [] },
    turret,
    levelManager,
    inputManager,
    renderer,
    flashTimer: 0,
    levelUpTimer: 0,
    lastSpawn: 0,

    // ─── Entry point ───────────────────────────
    start() {
      document.addEventListener('keydown', (e) => this._onKey(e));
      const loop = (ts) => {
        this.update(ts);
        this.render();
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    },

    startLevel: 0, // selected starting level on title screen

    // ─── Key dispatch ──────────────────────────
    _onKey(e) {
      if (this.state === 'title') {
        // Arrow keys to navigate level grid (2 columns)
        const maxLvl = this.levelManager.levels.length - 1;
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          this.startLevel = Math.max(0, this.startLevel - 1);
          return;
        }
        if (e.key === 'ArrowRight') {
          e.preventDefault();
          this.startLevel = Math.min(maxLvl, this.startLevel + 1);
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          this.startLevel = Math.max(0, this.startLevel - 2);
          return;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          this.startLevel = Math.min(maxLvl, this.startLevel + 2);
          return;
        }
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          this.reset();
          this.levelManager.current = this.startLevel;
          this.state = 'hands';
        }
        return;
      }
      if (this.state === 'hands') {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          this.state = 'levelUp';
          this.levelUpTimer = 180;
        }
        return;
      }
      if (this.state === 'gameOver') {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          this.state = 'title';
        }
        return;
      }
      if (this.state === 'levelUp') {
        if (e.key === ' ') {
          e.preventDefault();
          this.levelUpTimer = 0;
        }
        return;
      }

      // Escape — exit to title
      if (e.key === 'Escape') {
        e.preventDefault();
        this.state = 'title';
        return;
      }

      // Pause toggle (Space)
      if (e.key === ' ') {
        e.preventDefault();
        this.state = this.state === 'paused' ? 'playing' : 'paused';
        if (this.state === 'playing') this.lastSpawn = performance.now();
        return;
      }

      // Level skip (N = next) — works while playing or paused
      if (e.key === 'n' || e.key === 'N') {
        if (this.state === 'playing' || this.state === 'paused') {
          e.preventDefault();
          if (this.levelManager.current < this.levelManager.levels.length - 1) {
            this.levelManager.current++;
            this.levelManager.kills = 0;
            this.entities.invaders = [];
            this.inputManager.clear();
            this.state = 'levelUp';
            this.levelUpTimer = 120;
          }
          return;
        }
      }

      if (this.state === 'paused') return;

      // Playing — delegate to InputManager
      // Don't block browser shortcuts (Ctrl/Cmd combos, function keys)
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      e.preventDefault();
      const action = this.inputManager.handleKey(e.key, this.entities.invaders);
      this.handleAction(action);
    },

    // ─── Action processing ─────────────────────
    // Find the lowest (most dangerous) invader with matched > 0
    _lowestMatch() {
      let best = null;
      let bestY = -Infinity;
      for (const inv of this.entities.invaders) {
        if (inv.alive && inv.matched > 0 && inv.y > bestY) {
          best = inv;
          bestY = inv.y;
        }
      }
      return best;
    },

    _trackTurret() {
      const match = this._lowestMatch();
      if (match) {
        this.turret.targetX = match.centerX();
        this.turret.targetY = match.y;
      }
    },

    handleAction(action) {
      switch (action.type) {
        case 'kill': {
          const inv = action.target;
          inv.alive = false;

          // Snap turret to target & fire
          const cx = inv.centerX();
          this.turret.targetX = cx;
          this.turret.x = cx; // snap for the shot
          this.turret.targetY = inv.y;

          // Laser beam from turret to invader
          this.entities.lasers.push(
            createLaser(this.turret.x, GROUND_Y - 20, cx, inv.y)
          );

          // Explosion particles
          this._spawnExplosion(cx, inv.y, inv.text);

          // Score: text length * 10 * level multiplier
          this.score += inv.text.length * 10 * (this.levelManager.current + 1);

          // Check level advance
          if (this.levelManager.recordKill()) {
            this.state = 'levelUp';
            this.levelUpTimer = 180;
          }
          break;
        }
        case 'miss':
          this.flashTimer = 10;
          break;
        case 'partial':
        case 'backspace':
          this._trackTurret();
          break;
        // 'clear', 'ignore' — no game effect beyond buffer change
      }
    },

    // ─── Frame update ──────────────────────────
    update(timestamp) {
      if (this.state !== 'playing' && this.state !== 'levelUp') return;

      if (this.state === 'levelUp') {
        this.levelUpTimer--;
        if (this.levelUpTimer <= 0) {
          this.state = 'playing';
          // Clear remaining invaders with explosions
          for (const inv of this.entities.invaders) {
            if (inv.alive) {
              this._spawnExplosion(inv.centerX(), inv.y, inv.text);
              inv.alive = false;
            }
          }
          this.entities.invaders = [];
          this.entities.lasers = [];
        }
        // Keep updating particles/lasers so explosions animate during level-up
        for (const laser of this.entities.lasers) laser.update();
        for (const particle of this.entities.particles) particle.update();
        this.entities.lasers = this.entities.lasers.filter(e => e.alive);
        this.entities.particles = this.entities.particles.filter(e => e.alive);
        return;
      }

      // Spawn
      const config = this.levelManager.getConfig();
      if (timestamp - this.lastSpawn > config.spawnRate) {
        const aliveCount = this.entities.invaders.filter(i => i.alive).length;
        if (aliveCount < 8) {
          const text = this.levelManager.generateText();
          const charW = (text.length === 1 ? 22 : 16) * CHAR_RATIO;
          const textPx = text.length * charW;
          const x = Math.random() * (W - 40 - textPx) + 20;
          const speed = config.speed * (0.85 + Math.random() * 0.3);
          this.entities.invaders.push(createInvader(text, x, speed));
          this.lastSpawn = timestamp;
        }
      }

      // Update all entities
      for (const inv of this.entities.invaders) inv.update();
      for (const laser of this.entities.lasers) laser.update();
      for (const particle of this.entities.particles) particle.update();
      this.turret.update();

      // Ground collision
      for (const inv of this.entities.invaders) {
        if (!inv.alive) continue;
        if (inv.y >= GROUND_Y - 20) {
          inv.alive = false;
          this.lives--;
          this._spawnExplosion(inv.centerX(), GROUND_Y - 20, inv.text);
          this.flashTimer = 15;

          // Clear buffer if we were typing this one
          if (inv.text.startsWith(this.inputManager.buffer) && this.inputManager.buffer.length > 0) {
            this.inputManager.clear();
            this.entities.invaders.forEach(i => { i.matched = 0; });
          }

          if (this.lives <= 0) {
            this.state = 'gameOver';
            return;
          }
        }
      }

      // Cleanup dead entities
      this.entities.invaders = this.entities.invaders.filter(e => e.alive);
      this.entities.lasers = this.entities.lasers.filter(e => e.alive);
      this.entities.particles = this.entities.particles.filter(e => e.alive);

      if (this.flashTimer > 0) this.flashTimer--;
    },

    // ─── Frame render ──────────────────────────
    _renderPlayScene() {
      this.renderer.clear();
      this.renderer.drawFlash(this.flashTimer);
      this.renderer.drawStars();
      this.renderer.drawGround();

      for (const inv of this.entities.invaders) this.renderer.drawEntity(inv);
      for (const laser of this.entities.lasers) this.renderer.drawEntity(laser);
      for (const particle of this.entities.particles) this.renderer.drawEntity(particle);

      this.renderer.drawTurret(this.turret);
      this.renderer.drawHUD(this);
    },

    render() {
      if (this.state === 'title' || this.state === 'hands' || this.state === 'levelUp' || this.state === 'gameOver') {
        this.renderer.drawScreen(this.state, this);
        if (this.state === 'levelUp') {
          for (const laser of this.entities.lasers) this.renderer.drawEntity(laser);
          for (const p of this.entities.particles) this.renderer.drawEntity(p);
        }
        return;
      }

      if (this.state === 'paused') {
        this._renderPlayScene();
        this.renderer.drawPause();
        return;
      }

      this._renderPlayScene();
    },

    // ─── Helpers ────────────────────────────────
    _spawnExplosion(x, y, text) {
      const count = 12 + text.length * 3;
      for (let i = 0; i < count; i++) {
        const ch = text[Math.floor(Math.random() * text.length)];
        this.entities.particles.push(createParticle(x, y, ch));
      }
    },

    reset() {
      this.score = 0;
      this.lives = 3;
      this.entities = { invaders: [], lasers: [], particles: [] };
      this.turret.x = W / 2;
      this.turret.targetX = W / 2;
      this.turret.targetY = 0;
      this.flashTimer = 0;
      this.levelUpTimer = 0;
      this.lastSpawn = 0;
      this.levelManager.reset();
      this.inputManager.clear();
    },
  };

  return engine;
}


// ─── Bootstrap ───────────────────────────────────────────
// Wait for Press Start 2P to load (or timeout after 2s) so
// character spacing matches font metrics from the first frame.
const fontReady = document.fonts.load(`16px "Press Start 2P"`);
const timeout = new Promise(r => setTimeout(r, 2000));
let game;
Promise.race([fontReady, timeout]).then(() => {
  game = createEngine(document.getElementById('game'));
  game.start();
});
</script>
